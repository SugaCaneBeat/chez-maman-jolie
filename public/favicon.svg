<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background -->
  <circle cx="50" cy="50" r="50" fill="#0D0D0D"/>
  <!-- Gold ring -->
  <circle cx="50" cy="50" r="46.5" fill="none" stroke="#7A6012" stroke-width="2.2"/>
  <!-- C — white bold serif -->
  <text
    x="34" y="63"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="46"
    font-weight="700"
    fill="#FFFFFF"
    text-anchor="middle"
  >C</text>
  <!-- J — gold bold serif -->
  <text
    x="67" y="65"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="46"
    font-weight="700"
    fill="#C9922A"
    text-anchor="middle"
  >J</text>
  <!-- Diamond accent -->
  <rect x="46.5" y="77" width="7" height="7" fill="#C9922A" transform="rotate(45 50 80.5)"/>
</svg>
